esphome:
  name: dashboard
  friendly_name: Living Room Info Frame
  name_add_mac_suffix: false
  on_boot:
    priority: 600
    then: 
      - logger.log: "Turning on EPD power (GPIO15)" 
      - output.turn_on: epd_power 
      - delay: 500ms 
      - logger.log: "EPD power should be stable now"
      # Wait for API connection first — no point checking sensors before HA is connected
      - wait_until:
          condition:
            api.connected:
          timeout: 20s
      - logger.log: "API connected (or timeout)"
      # Now wait for actual sensor data to arrive
      - wait_until:
          condition:
            lambda: |-
              bool has_weather = id(ha_weather_condition).state != "";
              bool has_temp = !isnan(id(ha_weather_temperature).state);
              bool has_calendar = id(data_updated);
              bool has_battery = !isnan(id(battery_percent).state);
              ESP_LOGD("BOOT", "Waiting: weather=%d, temp=%d, calendar=%d, battery=%d", 
                       has_weather, has_temp, has_calendar, has_battery);
              return (has_weather || has_temp || has_calendar) && has_battery;
          timeout: 30s
      - logger.log: "Data received (or timeout) — forcing display update"
      - delay: 500ms
      - component.update: eink_display
      - logger.log: "Display updated with data"
      # Give e-ink time to physically finish rendering before sleeping
      - delay: 5s
      - logger.log: "Entering deep sleep"
      - deep_sleep.enter: deep_sleep_1
  on_shutdown:
    then:
      - output.turn_off: epd_power

esp32:
  board: lolin_s3
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

globals:
  - id: data_updated 
    type: bool 
    restore_value: no 
    initial_value: 'false'

deep_sleep:
  id: deep_sleep_1
  run_duration: 90s
  sleep_duration: 20min
  wakeup_pin:
    number: GPIO1
    inverted: false
  wakeup_pin_mode: KEEP_AWAKE

# --- SPI bus used by the display
spi:
  clk_pin: GPIO18
  mosi_pin: GPIO11

# --- Output pin for display power control (PWR)
output:
  - platform: gpio
    pin: GPIO15
    id: epd_power
    inverted: false

# --- Optional sensor / switch state (exposed to HA)
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO2
      mode: INPUT_PULLDOWN
      inverted: true
    name: "Deep Sleep Switch State"
    id: deepsleep_switch

# --- Sensors
time:
  - platform: homeassistant
    id: ha_time

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_power
    update_interval: 5s

  - platform: adc
    pin: GPIO3
    name: "Battery Voltage"
    id: battery_voltage
    update_interval: 5s
    attenuation: 12db
    filters:
      - multiply: 2.0
      - median:
          window_size: 5
          send_every: 3
          send_first_at: 3
    unit_of_measurement: "V"

  - platform: template
    name: "Battery"
    id: battery_percent
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      float v = id(battery_voltage).state;
      if (isnan(v)) return NAN;
      // LiPo discharge curve lookup (voltage -> percent)
      // Based on typical single-cell LiPo discharge profile
      float percent;
      if      (v >= 4.20f) percent = 100.0f;
      else if (v >= 4.15f) percent = 95.0f;
      else if (v >= 4.11f) percent = 90.0f;
      else if (v >= 4.08f) percent = 85.0f;
      else if (v >= 4.02f) percent = 80.0f;
      else if (v >= 3.98f) percent = 75.0f;
      else if (v >= 3.95f) percent = 70.0f;
      else if (v >= 3.91f) percent = 65.0f;
      else if (v >= 3.87f) percent = 60.0f;
      else if (v >= 3.85f) percent = 55.0f;
      else if (v >= 3.84f) percent = 50.0f;
      else if (v >= 3.82f) percent = 45.0f;
      else if (v >= 3.80f) percent = 40.0f;
      else if (v >= 3.79f) percent = 35.0f;
      else if (v >= 3.77f) percent = 30.0f;
      else if (v >= 3.75f) percent = 25.0f;
      else if (v >= 3.73f) percent = 20.0f;
      else if (v >= 3.71f) percent = 15.0f;
      else if (v >= 3.69f) percent = 10.0f;
      else if (v >= 3.61f) percent = 5.0f;
      else if (v >= 3.27f) percent = 2.0f;
      else                  percent = 0.0f;
      return percent;
    on_value:
      then:
        - logger.log: "Battery data received"

  - platform: homeassistant
    id: ha_weather_temperature
    entity_id: weather.forecast_dom
    attribute: temperature
    internal: true
    unit_of_measurement: "°C"
    accuracy_decimals: 1

  - platform: homeassistant
    id: ha_weather_uv
    entity_id: weather.forecast_dom
    attribute: uv_index
    internal: true

  # Forecast
  - platform: homeassistant
    id: ha_today_rain
    entity_id: sensor.forecast_today_precipitation
    internal: true
    unit_of_measurement: "mm"
  - platform: homeassistant
    id: ha_forecast_1_temp
    entity_id: sensor.forecast_day_1_temp_max
    internal: true
    unit_of_measurement: "°C"
    accuracy_decimals: 1
  - platform: homeassistant
    id: ha_forecast_2_temp
    entity_id: sensor.forecast_day_2_temp_max
    internal: true
    unit_of_measurement: "°C"
    accuracy_decimals: 1
  - platform: homeassistant
    id: ha_forecast_3_temp
    entity_id: sensor.forecast_day_3_temp_max
    internal: true
    unit_of_measurement: "°C"
    accuracy_decimals: 1
  - platform: homeassistant
    id: ha_forecast_4_temp
    entity_id: sensor.forecast_day_4_temp_max
    internal: true
    unit_of_measurement: "°C"
    accuracy_decimals: 1

  # Local data
  - platform: homeassistant
    id: local_temp
    entity_id: sensor.taras_temperature
    internal: true
    unit_of_measurement: "°C"
    accuracy_decimals: 1
  - platform: homeassistant
    id: local_humidity
    entity_id: sensor.taras_humidity
    internal: true
    unit_of_measurement: "%"
  - platform: homeassistant
    id: local_pressure
    entity_id: sensor.taras_pressure
    internal: true
    unit_of_measurement: "hPa"
  - platform: homeassistant
    id: local_air
    entity_id: sensor.taras_pm2_5
    internal: true
    unit_of_measurement: "µg/m³"
  - platform: homeassistant
    id: livingroom_temp
    entity_id: sensor.esphome_web_d57124_living_room_temperature
    internal: true
    unit_of_measurement: "°C"
    accuracy_decimals: 1
  - platform: homeassistant
    id: livingroom_humidity
    entity_id: sensor.esphome_web_d57124_living_room_humidity
    internal: true
    unit_of_measurement: "%"
  - platform: homeassistant
    id: home_tasks
    entity_id: sensor.donetick_open_tasks
    internal: true

  # External data
  - platform: homeassistant
    id: local_fuel
    entity_id: sensor.industriestr_34_super
    internal: true
    unit_of_measurement: "€"
  - platform: homeassistant
    id: eur_pln
    entity_id: sensor.eur_pln
    internal: true
  - platform: homeassistant
    id: ev_battery
    entity_id: sensor.tucson_ev_battery_level
    internal: true
    unit_of_measurement: "%"
  - platform: homeassistant
    id: ev_range
    entity_id: sensor.tucson_ev_range
    internal: true
    unit_of_measurement: "km"
  - platform: homeassistant
    id: fuel_range
    entity_id: sensor.tucson_fuel_driving_range
    internal: true
    unit_of_measurement: "km"

text_sensor:
  - platform: homeassistant
    id: ha_weather_condition
    entity_id: weather.forecast_dom
    internal: true
    on_value:
      then:
        - logger.log: "Weather data received"

  - platform: homeassistant
    id: ha_forecast_1_condition
    entity_id: sensor.forecast_day_1_conditions
    internal: true
  - platform: homeassistant
    id: ha_forecast_2_condition
    entity_id: sensor.forecast_day_2_conditions
    internal: true
  - platform: homeassistant
    id: ha_forecast_3_condition
    entity_id: sensor.forecast_day_3_conditions
    internal: true
  - platform: homeassistant
    id: ha_forecast_4_condition
    entity_id: sensor.forecast_day_4_conditions
    internal: true
  - platform: homeassistant
    id: ha_forecast_1_datetime
    entity_id: sensor.forecast_day_1_date
    internal: true
  - platform: homeassistant
    id: ha_forecast_2_datetime
    entity_id: sensor.forecast_day_2_date
    internal: true
  - platform: homeassistant
    id: ha_forecast_3_datetime
    entity_id: sensor.forecast_day_3_date
    internal: true
  - platform: homeassistant
    id: ha_forecast_4_datetime
    entity_id: sensor.forecast_day_4_date
    internal: true
  - platform: homeassistant
    entity_id: sensor.upcoming_events
    id: ha_upcoming_raw
    attribute: events
    internal: true
    on_value:
      then:
        - lambda: |-
            std::string raw = id(ha_upcoming_raw).state;
            ESP_LOGI("CALENDAR", "Raw data length: %d", raw.length());
            if (raw.length() > 0) {
              ESP_LOGI("CALENDAR", "First 200 chars: %s", raw.substr(0, 200).c_str());
            }
            id(data_updated) = true;
            ESP_LOGI("CALENDAR", "data_updated flag set");
        - logger.log: "Calendar data received"

