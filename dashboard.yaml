# --- Waveshare display (7.5in V2 monochrome)
display:
  - platform: waveshare_epaper
    id: eink_display
    model: 7.50inV2
    cs_pin: GPIO5
    dc_pin: GPIO16
    busy_pin:
      number: GPIO4
      inverted: true
    reset_pin: GPIO17
    reset_duration: 10ms
    update_interval: never
    rotation: 90
    lambda: |-
      // --- Helper: MDI weather icon mapping ---
      std::map<std::string, std::string> weather_icon_map {
        {"cloudy", "\U000F0590"}, {"cloudy-alert", "\U000F0F2F"}, {"cloudy-arrow-right", "\U000F0E6E"},
        {"fog", "\U000F0591"}, {"hail", "\U000F0592"}, {"hazy", "\U000F0F30"}, {"hurricane", "\U000F0898"},
        {"lightning", "\U000F0593"}, {"lightning-rainy", "\U000F067E"}, {"night", "\U000F0594"},
        {"night-partly-cloudy", "\U000F0F31"}, {"partlycloudy", "\U000F0595"}, {"partly-lightning", "\U000F0F32"},
        {"partly-rainy", "\U000F0F33"}, {"partly-snowy", "\U000F0F34"}, {"partly-snowy-rainy", "\U000F0F35"},
        {"pouring", "\U000F0596"}, {"rainy", "\U000F0597"}, {"snowy", "\U000F0598"}, {"snowy-heavy", "\U000F0F36"},
        {"snowy-rainy", "\U000F067F"}, {"sunny", "\U000F0599"}, {"sunny-alert", "\U000F0F37"}, {"sunny-off", "\U000F14E4"},
        {"sunset", "\U000F059A"}, {"sunset-down", "\U000F059B"}, {"sunset-up", "\U000F059C"}, {"tornado", "\U000F0F38"},
        {"windy", "\U000F059D"}, {"windy-variant", "\U000F059E"}, {"clear-night", "\U000F0594"}
      };

      float uv = id(ha_weather_uv).state;
      std::string uv_text;
      if (std::isnan(uv)) uv_text = "b/d";
      else if (uv <= 2.0) uv_text = "Niski";
      else if (uv <= 5.0) uv_text = "Średni";
      else if (uv <= 7.0) uv_text = "Wysoki";
      else if (uv <= 10.0) uv_text = "Bardzo wysoki";
      else uv_text = "Ekstremalny";

      float fuel = id(local_fuel).state;

      // --- Map English weekday names to Polish abbreviations ---
      std::map<std::string, std::string> weekday_pl {
        {"Monday", "Pon"}, {"Tuesday", "Wt"}, {"Wednesday", "Śr"}, {"Thursday", "Czw"},
        {"Friday", "Pt"}, {"Saturday", "Sob"}, {"Sunday", "Niedz"}
      };

      // --- Current weather ---
      std::string cur_cond = id(ha_weather_condition).state;
      std::string cur_icon = "?";
      auto itmap = weather_icon_map.find(cur_cond);
      if (itmap != weather_icon_map.end()) cur_icon = itmap->second;

      it.printf(100, 88, id(font_mdi_large), TextAlign::TOP_CENTER, "%s", cur_icon.c_str());
      if (!std::isnan(id(ha_weather_temperature).state))
        it.printf(300, 58, id(font_large_bold), TextAlign::TOP_CENTER, "%2.0f°C", id(ha_weather_temperature).state);
      else
        it.printf(300, 58, id(font_large_bold), TextAlign::TOP_CENTER, "--°C");

      it.printf(200, 180, id(font_mdi_medium), TextAlign::TOP_LEFT, "\U000F0F55");
      if (!std::isnan(id(livingroom_temp).state))
        it.printf(240, 185, id(font_small_bold), TextAlign::TOP_LEFT, "%2.0f°C", id(livingroom_temp).state);
      else
        it.printf(240, 185, id(font_small_bold), TextAlign::TOP_LEFT, "--°C");

      it.printf(300, 180, id(font_mdi_medium), TextAlign::TOP_LEFT, "\U000F058E");
      if (!std::isnan(id(livingroom_humidity).state))
        it.printf(335, 185, id(font_small_bold), TextAlign::TOP_LEFT, "%2.0f%%", id(livingroom_humidity).state);
      else
        it.printf(335, 185, id(font_small_bold), TextAlign::TOP_LEFT, "--%");

      // --- Horizontal separator (3px) ---
      int sep_y = 225;
      it.line(40, sep_y, 440, sep_y);
      it.line(40, sep_y - 1, 440, sep_y - 1);
      it.line(40, sep_y + 1, 440, sep_y + 1);

      // --- 4-day forecast ---
      int base_x = 90;
      int col_spacing = 100;
      int day_y = sep_y + 12;
      int icon_y = sep_y + 42;
      int temp_y = sep_y + 82;

      for (int i = 1; i <= 4; i++) {
        int cx = base_x + (i-1) * col_spacing;
        float t = NAN;
        std::string cond = "";
        std::string dt = "";

        if (i == 1) { t = id(ha_forecast_1_temp).state; cond = id(ha_forecast_1_condition).state; dt = id(ha_forecast_1_datetime).state; }
        else if (i == 2) { t = id(ha_forecast_2_temp).state; cond = id(ha_forecast_2_condition).state; dt = id(ha_forecast_2_datetime).state; }
        else if (i == 3) { t = id(ha_forecast_3_temp).state; cond = id(ha_forecast_3_condition).state; dt = id(ha_forecast_3_datetime).state; }
        else if (i == 4) { t = id(ha_forecast_4_temp).state; cond = id(ha_forecast_4_condition).state; dt = id(ha_forecast_4_datetime).state; }

        // Extract weekday name only
        std::string dayname = dt;
        size_t comma = dt.find(',');
        if (comma != std::string::npos) {
          std::string day_eng = dt.substr(0, comma);
          auto wd_it = weekday_pl.find(day_eng);
          if (wd_it != weekday_pl.end()) dayname = wd_it->second;
        }

        // Icon
        std::string ficon = "?";
        auto f_it = weather_icon_map.find(cond);
        if (f_it != weather_icon_map.end()) ficon = f_it->second;

        it.printf(cx, day_y, id(font_small_bold), TextAlign::TOP_CENTER, "%s", dayname.c_str());
        it.printf(cx, icon_y, id(font_mdi_medium), TextAlign::TOP_CENTER, "%s", ficon.c_str());
        if (isnan(t)) it.printf(cx, temp_y, id(font_small_bold), TextAlign::TOP_CENTER, "--");
        else it.printf(cx, temp_y, id(font_small_bold), TextAlign::TOP_CENTER, "%.0f°C", t);
      }

      // --- Horizontal separator below forecast ---
      int sep2_y = temp_y + 40;
      it.line(40, sep2_y, 440, sep2_y);
      it.line(40, sep2_y - 1, 440, sep2_y - 1);
      it.line(40, sep2_y + 1, 440, sep2_y + 1);

      // --- Left column: local data ---
      int last_y = sep2_y + 20;
      int spacing = 10;

      // --- Get current date from HA ---
      auto time_now = id(ha_time).now();
      if (!time_now.is_valid()) {
        it.printf(50, last_y, id(font_small_bold), TextAlign::TOP_LEFT, "Brak danych o czasie");
      } else {
        std::string weekdays_pl[7] = {"niedziela", "poniedziałek", "wtorek", "środa", "czwartek", "piątek", "sobota"};
        std::string months_pl[12] = {
          "styczeń", "luty", "marzec", "kwiecień", "maj", "czerwiec",
          "lipiec", "sierpień", "wrzesień", "październik", "listopad", "grudzień"
        };

        // ESPHome: day_of_week 1=Sunday, 2=Monday, ..., 7=Saturday
        int weekday = time_now.day_of_week;
        int day = time_now.day_of_month;
        int month = time_now.month;  // 1-12

        std::string day_name = weekdays_pl[(weekday - 1) % 7];
        std::string month_name = months_pl[month - 1];

        it.printf(50, last_y, id(font_small_bold), TextAlign::TOP_LEFT, "%s,", day_name.c_str());
        last_y += 8 + spacing;
        it.printf(50, last_y, id(font_small_bold), TextAlign::TOP_LEFT, "%d %s", day, month_name.c_str());
      }

      last_y += 20 + spacing;
      it.line(40, last_y + 1, 210, last_y + 1);
      it.line(40, last_y + 3, 210, last_y + 3);
      last_y += 1 + spacing;

      it.printf(50, last_y, id(font_mdi_medium), TextAlign::TOP_LEFT, "\U000F01AD");
      if (!std::isnan(id(eur_pln).state)) {
        it.printf(90, last_y + 2, id(font_small_bold), TextAlign::TOP_LEFT, "%.2fPLN", id(eur_pln).state);
      } else {
        it.printf(90, last_y + 2, id(font_small_bold), TextAlign::TOP_LEFT, "brak danych");
      }
      last_y += 24 + spacing;

      it.printf(50, last_y, id(font_mdi_medium), TextAlign::TOP_LEFT, "\U000F0EA7");
      if (!std::isnan(id(home_tasks).state)) {
        it.printf(90, last_y + 2, id(font_small_bold), TextAlign::TOP_LEFT, "zadania: %2.0f", id(home_tasks).state);
      } else {
        it.printf(90, last_y + 2, id(font_small_bold), TextAlign::TOP_LEFT, "brak danych");
      }
      last_y += 24 + spacing;

      float rain = id(ha_today_rain).state;
      const char* rain_desc;

      if (std::isnan(rain)) {
        rain_desc = "brak danych";
      } else if (rain < 0.2) {
        rain_desc = "bez deszczu";
      } else if (rain < 1.0) {
        rain_desc = "możliwe opady";
      } else if (rain < 5.0) {
        rain_desc = "niewielki deszcz";
      } else if (rain < 15.0) {
        rain_desc = "potrzebny parasol";
      } else {
        rain_desc = "ulewa";
      }

      it.printf(50, last_y, id(font_mdi_medium), TextAlign::TOP_LEFT, "\U000F054A");
      it.printf(90, last_y + 2, id(font_small_bold), TextAlign::TOP_LEFT, "%s", rain_desc);

      last_y += 32 + spacing;

      // CALENDAR ----------------------------------------

      std::string raw = id(ha_upcoming_raw).state;

      // --- Helper functions ---
      auto trim = [](const std::string &s) {
        size_t a=0; while (a<s.size() && isspace((unsigned char)s[a])) a++;
        size_t b=s.size(); while (b>a && isspace((unsigned char)s[b-1])) b--;
        return s.substr(a,b-a);
      };
      auto lower_copy = [](const std::string &s){
        std::string out = s;
        for (auto &c : out) c = std::tolower((unsigned char)c);
        return out;
      };

      auto extract_all_after = [&](const std::string &text, const std::string &marker) {
        std::vector<std::string> results;
        if (text.empty()) return results;

        std::string low = lower_copy(text);
        std::string mlow = lower_copy(marker);

        size_t pos = 0;
        while (true) {
          size_t idx = low.find(mlow, pos);
          if (idx == std::string::npos) break;
          size_t start = idx + mlow.size();
          size_t next_today = low.find("today:", start);
          size_t next_tom = low.find("tomorrow:", start);
          size_t next_marker = std::string::npos;
          if (next_today != std::string::npos) next_marker = next_today;
          if (next_tom != std::string::npos && (next_marker==std::string::npos || next_tom < next_marker))
            next_marker = next_tom;
          size_t end = (next_marker == std::string::npos) ? low.size() : next_marker;

          std::string seg = raw.substr(start, end - start);
          std::string norm;
          bool in_sp = false;
          for (char c : seg) {
            if (isspace((unsigned char)c)) { if (!in_sp) { norm.push_back(' '); in_sp = true; } }
            else { norm.push_back(c); in_sp = false; }
          }
          norm = trim(norm);
          if (!norm.empty()) results.push_back(norm);
          pos = end;
        }
        return results;
      };

      auto today_list = extract_all_after(raw, "Today:");
      auto tomorrow_list = extract_all_after(raw, "Tomorrow:");

      // --- Parse events for a given day ---
      struct DayDisplay {
        std::vector<std::string> lines;
        bool draw_trash = false;
      };

      auto analyze_day = [&](const std::vector<std::string> &lst) -> DayDisplay {
        DayDisplay out;
        if (lst.empty()) {
          out.lines.push_back("brak wydarzeń");
          return out;
        }

        bool has_urlop = false;

        // Check for "Urlop" (vacation) / "Urlaub"
        for (auto &s : lst) {
          std::string low = lower_copy(s);
          if (low.find("urlop") != std::string::npos ||
              low.find("urlaub") != std::string::npos) {
            has_urlop = true;
            break;
          }
        }

        // Process events
        for (auto &s : lst) {
          std::string low = lower_copy(s);
          std::string display = s;
          bool is_trash = false;

          // Identify work shifts
          bool is_shift = (low.find("fruh") != std::string::npos || 
                          low.find("früh") != std::string::npos ||
                          low.find("spat") != std::string::npos || 
                          low.find("spät") != std::string::npos ||
                          low.find("nacht") != std::string::npos);
          // Skip vacation events themselves (re-added as "Urlop" at the end)
          bool is_vacation = (low.find("urlop") != std::string::npos ||
                              low.find("urlaub") != std::string::npos);
          if (is_vacation) {
            continue;
          }
          if (has_urlop && is_shift) {
            // If on vacation -> skip shifts
            continue;
          }

          // Map shift names
          if (low.find("fruh") != std::string::npos || low.find("früh") != std::string::npos)
            display = "Ranna zmiana";
          else if (low.find("spat") != std::string::npos || low.find("spät") != std::string::npos)
            display = "Zmiana popołudniowa";
          else if (low.find("nacht") != std::string::npos)
            display = "Nocna zmiana";

          if (low.find("wywoz") != std::string::npos || low.find("wywóz") != std::string::npos ||
              low.find("smieci") != std::string::npos || low.find("śmieci") != std::string::npos)
            is_trash = true;

          out.lines.push_back(display);
          if (is_trash) out.draw_trash = true;
        }

        if (has_urlop) {
          // Always add "Urlop" (vacation) at the top
          out.lines.insert(out.lines.begin(), "Urlop");
        }

        return out;
      };

      auto today_disp = analyze_day(today_list);
      auto tomorrow_disp = analyze_day(tomorrow_list);

      // --- Rendering ---
      int max_content_y = 728;  // hard limit: bottom_y(758) - 30px margin
      int skipped = 0;
      bool overflow = false;

      it.printf(50, last_y, id(font_small_bold), TextAlign::TOP_LEFT, "W KALENDARZU");
      last_y += 20 + spacing;
      it.line(40, last_y, 210, last_y);
      last_y += spacing;

      // TODAY
      it.printf(50, last_y, id(font_small_bold), TextAlign::TOP_LEFT, "Dzisiaj:");
      last_y += 15 + spacing;

      if (today_disp.lines.empty()) {
          it.printf(50, last_y, id(font_small), TextAlign::TOP_LEFT, "Brak wydarzeń");
          last_y += 10 + spacing;
      } else {
        for (size_t idx = 0; idx < today_disp.lines.size(); idx++) {
            auto &line = today_disp.lines[idx];

            // Check if we have space for at least one more line
            if (last_y + 22 > max_content_y) {
              skipped += (today_disp.lines.size() - idx) + tomorrow_disp.lines.size();
              overflow = true;
              break;
            }

            // Check if content has parentheses (time info)
            size_t paren_pos = line.find('(');
            std::string main_text = line;
            std::string extra_text;

            if (paren_pos != std::string::npos) {
                main_text = line.substr(0, paren_pos);
                extra_text = line.substr(paren_pos);
            }

            bool is_trash = (line.find("śmieci") != std::string::npos || line.find("smieci") != std::string::npos);

            if (is_trash) {
                it.printf(50, last_y + 4, id(font_mdi_info), TextAlign::TOP_LEFT, "\U000F06CC");
                it.printf(70, last_y, id(font_small), TextAlign::TOP_LEFT, "%s", main_text.c_str());
                last_y += 12 + spacing;

                if (!extra_text.empty() && last_y + 22 <= max_content_y) {
                    it.printf(70, last_y, id(font_small), TextAlign::TOP_LEFT, "%s", extra_text.c_str());
                    last_y += 12 + spacing;
                }
            } else {
                it.printf(50, last_y, id(font_small), TextAlign::TOP_LEFT, "%s", main_text.c_str());
                last_y += 12 + spacing;

                if (!extra_text.empty() && last_y + 22 <= max_content_y) {
                    it.printf(65, last_y, id(font_small), TextAlign::TOP_LEFT, "%s", extra_text.c_str());
                    last_y += 12 + spacing;
                }
            }
        }

      if (!overflow) last_y += 5;
      }

      // TOMORROW
      if (!overflow) {
        // Check if we can fit at least the header + one line
        if (last_y + 47 > max_content_y) {
          // Can't fit Tomorrow section at all
          skipped += tomorrow_disp.lines.size();
          overflow = true;
        } else {
          it.printf(50, last_y, id(font_small_bold), TextAlign::TOP_LEFT, "Jutro:");
          last_y += 15 + spacing;

          if (tomorrow_disp.lines.empty()) {
            it.printf(50, last_y, id(font_small), TextAlign::TOP_LEFT, "Brak wydarzeń");
            last_y += 10 + spacing;
          } else {
            for (size_t idx = 0; idx < tomorrow_disp.lines.size(); idx++) {
              auto &line = tomorrow_disp.lines[idx];

              if (last_y + 22 > max_content_y) {
                skipped += (tomorrow_disp.lines.size() - idx);
                overflow = true;
                break;
              }

              size_t paren_pos = line.find('(');
              std::string main_text = line;
              std::string extra_text;

              if (paren_pos != std::string::npos) {
                  main_text = line.substr(0, paren_pos);
                  extra_text = line.substr(paren_pos);
              }

              bool is_trash = (line.find("śmieci") != std::string::npos || line.find("smieci") != std::string::npos);

              if (is_trash) {
                  it.printf(50, last_y + 4, id(font_mdi_info), TextAlign::TOP_LEFT, "\U000F06CC");
                  it.printf(70, last_y, id(font_small), TextAlign::TOP_LEFT, "%s", main_text.c_str());
                  last_y += 12 + spacing;

                  if (!extra_text.empty() && last_y + 22 <= max_content_y) {
                      it.printf(70, last_y, id(font_small), TextAlign::TOP_LEFT, "%s", extra_text.c_str());
                      last_y += 12 + spacing;
                  }
              } else {
                  it.printf(50, last_y, id(font_small), TextAlign::TOP_LEFT, "%s", main_text.c_str());
                  last_y += 12 + spacing;

                  if (!extra_text.empty() && last_y + 22 <= max_content_y) {
                      it.printf(65, last_y, id(font_small), TextAlign::TOP_LEFT, "%s", extra_text.c_str());
                      last_y += 12 + spacing;
                  }
              }
            }
          }
        }
      }

      // Show overflow indicator if events were skipped
      if (skipped > 0) {
        char skip_buf[32];
        snprintf(skip_buf, sizeof(skip_buf), "...i %d więcej", skipped);
        it.printf(50, last_y, id(font_info), TextAlign::TOP_LEFT, "%s", skip_buf);
        last_y += 14 + spacing;
      }

      // END OF CALENDAR -------------------------------------

      // --- Vertical separator between columns ---
      int vertical_sep_x = 270;
      int vsep_end = std::min(last_y + 24 + spacing, max_content_y);
      it.line(vertical_sep_x, sep2_y + 10, vertical_sep_x, vsep_end);

      // --- Right column: external data ---
      int right_col_x = vertical_sep_x + 20;
      int right_y = sep2_y + 20;
      int right_spacing = spacing;

      it.printf(right_col_x, right_y, id(font_small_bold), TextAlign::TOP_LEFT, "Dane lokalne:");
      right_y += 8 + right_spacing;
      it.printf(right_col_x, right_y, id(font_info), TextAlign::TOP_LEFT, "Czujnik taras");
      right_y += 16 + right_spacing;

      it.printf(right_col_x, right_y, id(font_mdi_medium), TextAlign::TOP_LEFT, "\U000F050F");
      if (!std::isnan(id(local_temp).state))
        it.printf(right_col_x + 40, right_y + 3, id(font_small_bold), TextAlign::TOP_LEFT, "%2.0f°C", id(local_temp).state);
      else
        it.printf(right_col_x + 40, right_y + 3, id(font_small_bold), TextAlign::TOP_LEFT, "b/d");
      right_y += 24 + right_spacing;

      it.printf(right_col_x, right_y, id(font_mdi_medium), TextAlign::TOP_LEFT, "\U000F058E");
      if (!std::isnan(id(local_humidity).state))
        it.printf(right_col_x + 40, right_y + 3, id(font_small_bold), TextAlign::TOP_LEFT, "%2.0f%%", id(local_humidity).state);
      else
        it.printf(right_col_x + 40, right_y + 3, id(font_small_bold), TextAlign::TOP_LEFT, "b/d");
      right_y += 24 + right_spacing;

      it.printf(right_col_x, right_y, id(font_mdi_medium), TextAlign::TOP_LEFT, "\U000F029A");
      if (!std::isnan(id(local_pressure).state))
        it.printf(right_col_x + 40, right_y + 3, id(font_small_bold), TextAlign::TOP_LEFT, "%.0fhPa", id(local_pressure).state);
      else
        it.printf(right_col_x + 40, right_y + 3, id(font_small_bold), TextAlign::TOP_LEFT, "b/d");
      right_y += 24 + right_spacing;

      it.printf(right_col_x, right_y, id(font_mdi_medium), TextAlign::TOP_LEFT, "\U000F0F37");
      it.printf(right_col_x + 40, right_y + 3, id(font_small_bold), TextAlign::TOP_LEFT, "%s UV", uv_text.c_str());
      right_y += 24 + right_spacing;

      it.printf(right_col_x, right_y, id(font_mdi_medium), TextAlign::TOP_LEFT, "\U000F0EC9");
      if (!std::isnan(id(local_air).state))
        it.printf(right_col_x + 40, right_y + 3, id(font_small_bold), TextAlign::TOP_LEFT, "%.2fµg/m³", id(local_air).state);
      else
        it.printf(right_col_x + 40, right_y + 3, id(font_small_bold), TextAlign::TOP_LEFT, "b/d");
      right_y += 24 + right_spacing;

      it.printf(right_col_x, right_y, id(font_mdi_medium), TextAlign::TOP_LEFT, "\U000F0298"); // fuel icon
      if (isnan(fuel)) it.printf(right_col_x + 40, right_y + 2, id(font_small_bold), TextAlign::TOP_LEFT, "LEX zamknięty");
      else it.printf(right_col_x + 40, right_y + 3, id(font_small_bold), TextAlign::TOP_LEFT, "%.2f€ (LEX)", id(local_fuel).state);
      right_y += 24 + right_spacing;

      it.line(right_col_x, right_y + 10, right_col_x + 150, right_y + 10);
      right_y += 1 + right_spacing;
      it.printf(right_col_x, right_y, id(font_small), TextAlign::TOP_LEFT, "Tucson PHEV:");
      right_y += 15 + right_spacing;

      it.printf(right_col_x, right_y, id(font_mdi_medium), TextAlign::TOP_LEFT, "\U000F05F1");
      if (!std::isnan(id(ev_battery).state) && !std::isnan(id(ev_range).state))
        it.printf(right_col_x + 40, right_y + 3, id(font_small_bold), TextAlign::TOP_LEFT, "%2.0f%% / %2.0fkm", id(ev_battery).state, id(ev_range).state);
      else
        it.printf(right_col_x + 40, right_y + 3, id(font_small_bold), TextAlign::TOP_LEFT, "b/d");

      right_y += 24 + right_spacing;

      it.printf(right_col_x, right_y, id(font_mdi_medium), TextAlign::TOP_LEFT, "\U000F07CA");
      if (!std::isnan(id(fuel_range).state))
        it.printf(right_col_x + 40, right_y + 3, id(font_small_bold), TextAlign::TOP_LEFT, "%2.0fkm", id(fuel_range).state);
      else
        it.printf(right_col_x + 40, right_y + 3, id(font_small_bold), TextAlign::TOP_LEFT, "b/d");

      // --- FOOTER / STATUS ---
      int bottom_y = 758;  // fixed position at bottom edge
      int left_margin = 40;

      // WiFi signal
      float wifi_db = id(wifi_power).state;
      std::string wifi_icon = "\U000F092B"; // alert-outline (no signal)
      if (!std::isnan(wifi_db)) {
        if (wifi_db > -55) wifi_icon = "\U000F0928"; // strong
        else if (wifi_db > -65) wifi_icon = "\U000F0925"; // good
        else if (wifi_db > -75) wifi_icon = "\U000F0922"; // moderate
        else if (wifi_db > -85) wifi_icon = "\U000F091F"; // weak
        else wifi_icon = "\U000F092B"; // very weak / no signal
      }

      it.printf(left_margin, bottom_y, id(font_mdi_info), TextAlign::BASELINE_LEFT, "%s", wifi_icon.c_str());
      if (!std::isnan(wifi_db)) {
        it.printf(left_margin + 24, bottom_y, id(font_info), TextAlign::BASELINE_LEFT, "%.0fdBm", wifi_db);
      } else {
        it.printf(left_margin + 24, bottom_y, id(font_info), TextAlign::BASELINE_LEFT, "---");
      }

      // Battery
      float bat = id(battery_percent).state;
      std::string bat_icon = "\U000F10CD"; // alert-outline
      if (!std::isnan(bat)) {
        if (bat >= 90) bat_icon = "\U000F0079";
        else if (bat >= 80) bat_icon = "\U000F0082";
        else if (bat >= 70) bat_icon = "\U000F0081";
        else if (bat >= 60) bat_icon = "\U000F0080";
        else if (bat >= 50) bat_icon = "\U000F007E";
        else if (bat >= 40) bat_icon = "\U000F007D";
        else if (bat >= 30) bat_icon = "\U000F007C";
        else if (bat >= 20) bat_icon = "\U000F007B";
        else if (bat >= 15) bat_icon = "\U000F007A"; // (low warning)
        // below 15% -> alert icon (default)
      }

      int battery_x = 125;
      it.printf(battery_x, bottom_y, id(font_mdi_info), TextAlign::BASELINE_LEFT, "%s", bat_icon.c_str());
      if (!std::isnan(bat)) {
        it.printf(battery_x + 24, bottom_y, id(font_info), TextAlign::BASELINE_LEFT, "%.0f%%", bat);
      } else {
        it.printf(battery_x + 24, bottom_y, id(font_info), TextAlign::BASELINE_LEFT, "---");
      }

      // Last update date and time
      auto now = id(ha_time).now();
      if (now.is_valid()) {
        char buf[32];
        snprintf(buf, sizeof(buf), "%02d:%02d  %02d.%02d.%04d",
                 now.hour, now.minute, now.day_of_month, now.month, now.year);
        it.printf(440, bottom_y, id(font_info), TextAlign::BASELINE_RIGHT, "Ost. aktualizacja: %s", buf);
      } else {
        it.printf(440, bottom_y, id(font_info), TextAlign::BASELINE_RIGHT, "Brak danych o czasie");
      }

